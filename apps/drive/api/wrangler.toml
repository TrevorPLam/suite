name = "drive-api"
main = "src/index.ts"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]

[vars]
# BETTER_AUTH_URL should be set via environment variable (e.g., wrangler secret put BETTER_AUTH_URL or .env file)

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "rate-limit-kv"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "auth-kv"

[[r2_buckets]]
binding = "R2"
bucket_name = "drive-files"

[[hyperdrive]]
binding = "HYPERDRIVE"
# id should be set to actual Hyperdrive configuration ID from Cloudflare dashboard
# Example: id = "your-hyperdrive-config-id"
